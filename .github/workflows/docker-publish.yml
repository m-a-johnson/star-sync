name: Build and Publish Docker Image

on:
  push:
    branches: [ main ]       # auto-build on every push to main
  workflow_dispatch:          # also allow triggering manually from the GitHub UI

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # becomes ghcr.io/YOUR_USERNAME/star-sync

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read    # read the repo
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically provided by GitHub, no setup needed

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
